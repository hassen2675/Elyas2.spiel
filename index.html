<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elyas 3D Racer</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:10;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:cyan;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
<h2>🏎️ Elyas 3D Racer</h2>
<p>Münzen: <span id="coins">0</span></p>
<p>Level: <span id="level">1</span></p>
<button onclick="startGame()">START</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script>

let scene,camera,renderer;
let car;
let coins=0;
let level=1;
let speed=0.4;
let obstacles=[];

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x050816);

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(0,10,10);
scene.add(light);

const ambient=new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambient);

createRoad();
createCar();

animate();
}

function createRoad(){

const roadGeo=new THREE.BoxGeometry(10,0.1,200);
const roadMat=new THREE.MeshStandardMaterial({
color:0x222222
});

const road=new THREE.Mesh(roadGeo,roadMat);
road.position.z=-80;

scene.add(road);
}

function createCar(){

car=new THREE.Group();

const bodyMat=new THREE.MeshStandardMaterial({
color:0xff0044
});

const body=new THREE.Mesh(
new THREE.BoxGeometry(2,0.5,4),
bodyMat
);

body.position.y=0.5;
car.add(body);

const top=new THREE.Mesh(
new THREE.BoxGeometry(1.2,0.5,1.5),
new THREE.MeshStandardMaterial({
color:0x00ffff
})
);

top.position.y=1;
top.position.z=-0.2;

car.add(top);

car.position.y=0.3;
car.position.z=5;

scene.add(car);
}

function createObstacle(){

const geo=new THREE.BoxGeometry(2,2,2);

const mat=new THREE.MeshStandardMaterial({
color:0xffff00
});

const obs=new THREE.Mesh(geo,mat);

obs.position.x=(Math.random()-0.5)*6;
obs.position.y=1;
obs.position.z=-100;

scene.add(obs);

obstacles.push(obs);
}

function animate(){

requestAnimationFrame(animate);

for(let i=0;i<obstacles.length;i++){

obstacles[i].position.z+=speed;

if(obstacles[i].position.z>10){

scene.remove(obstacles[i]);
obstacles.splice(i,1);

coins++;
document.getElementById("coins").innerText=coins;

if(coins>10){
level=2;
speed=0.6;
}

if(coins>20){
level=3;
speed=0.8;
}

document.getElementById("level").innerText=level;
}
}

renderer.render(scene,camera);
}

function startGame(){

setInterval(createObstacle,1200);

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft"){
car.position.x-=1;
}

if(e.key==="ArrowRight"){
car.position.x+=1;
}

});

}

init();

</script>

</body>
</html>
