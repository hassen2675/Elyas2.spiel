<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elias Jump Game</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}
canvas{
    background:#222;
    display:block;
    margin:20px auto;
    border:3px solid white;
}
</style>
</head>
<body>

<h1>Elias Jump Game</h1>
<p>Leertaste drücken zum Springen</p>

<canvas id="game" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
    x:50,
    y:220,
    w:40,
    h:40,
    vy:0,
    jumping:false
};

let obstacle = {
    x:800,
    y:230,
    w:30,
    h:30
};

let gravity = 0.8;
let score = 0;
let gameOver = false;

document.addEventListener("keydown", e=>{
    if(e.code==="Space" && !player.jumping){
        player.vy = -14;
        player.jumping = true;
    }
});

function update(){
    if(gameOver) return;

    player.y += player.vy;
    player.vy += gravity;

    if(player.y >= 220){
        player.y = 220;
        player.jumping = false;
    }

    obstacle.x -= 6;

    if(obstacle.x < -30){
        obstacle.x = 800;
        score++;
    }

    if(
        player.x < obstacle.x + obstacle.w &&
        player.x + player.w > obstacle.x &&
        player.y < obstacle.y + obstacle.h &&
        player.y + player.h > obstacle.y
    ){
        gameOver = true;
    }
}

function draw(){
    ctx.clearRect(0,0,800,300);

    ctx.fillStyle = "lime";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.fillStyle = "red";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

    ctx.fillStyle = "white";
    ctx.font = "24px Arial";
    ctx.fillText("Score: " + score, 20, 30);

    if(gameOver){
        ctx.fillStyle = "yellow";
        ctx.font = "40px Arial";
        ctx.fillText("Game Over", 280, 150);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
