<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Elias Runner V2</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f1029,#20235c,#0ea5e9);
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    overflow:hidden;
  }
  .wrap{
    width:min(950px,96vw);
    text-align:center;
  }
  h1{
    margin:10px 0 4px;
    font-size:42px;
    letter-spacing:1px;
    text-shadow:0 4px 15px #000;
  }
  .sub{opacity:.9;margin-bottom:10px}
  canvas{
    width:100%;
    height:auto;
    border-radius:24px;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
    border:3px solid rgba(255,255,255,.35);
    background:#111;
    touch-action:manipulation;
  }
  .btns{margin-top:12px}
  button{
    border:0;
    border-radius:999px;
    padding:12px 22px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    background:#facc15;
    color:#111;
    box-shadow:0 8px 25px rgba(0,0,0,.3);
  }
  .hint{font-size:14px;opacity:.85;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <h1>⚡ Elias Runner V2</h1>
  <div class="sub">Springen • Münzen sammeln • Rekord schlagen</div>
  <canvas id="game" width="900" height="420"></canvas>
  <div class="btns">
    <button onclick="restart()">Neu starten</button>
  </div>
  <div class="hint">PC: Leertaste / Pfeil hoch · Handy: Bildschirm antippen</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, obstacles, coins, clouds, particles;
let score, coinsCount, speed, gameOver, started, frame, best;

best = Number(localStorage.getItem("elias_best_v2") || 0);

function reset(){
  player = {x:90,y:285,w:48,h:58,vy:0,onGround:true,rot:0};
  obstacles = [];
  coins = [];
  clouds = [
    {x:80,y:65,s:1.1},{x:350,y:95,s:.8},{x:690,y:70,s:1.0}
  ];
  particles = [];
  score = 0;
  coinsCount = 0;
  speed = 5;
  gameOver = false;
  started = false;
  frame = 0;
}
reset();

function jump(){
  if(gameOver){ restart(); return; }
  started = true;
  if(player.onGround){
    player.vy = -17;
    player.onGround = false;
    for(let i=0;i<8;i++) particles.push({x:player.x+20,y:player.y+58,vx:-Math.random()*4,vy:-Math.random()*3,life:25});
  }
}

document.addEventListener("keydown", e=>{
  if(e.code==="Space" || e.code==="ArrowUp") jump();
});
canvas.addEventListener("pointerdown", jump);

function restart(){ reset(); started=true; }

function addObstacle(){
  const h = 38 + Math.random()*42;
  obstacles.push({x:930,y:340-h,w:34+Math.random()*18,h:h});
}
function addCoin(){
  coins.push({x:930,y:185+Math.random()*90,r:14,t:0});
}

function rectHit(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function update(){
  frame++;
  clouds.forEach(c=>{
    c.x -= speed*.18*c.s;
    if(c.x < -120){ c.x = 980; c.y = 45 + Math.random()*75; }
  });

  particles.forEach(p=>{p.x+=p.vx; p.y+=p.vy; p.life--;});
  particles = particles.filter(p=>p.life>0);

  if(!started || gameOver) return;

  score += 0.08;
  speed = 5 + Math.floor(score/12)*0.45;

  player.vy += 0.85;
  player.y += player.vy;
  player.rot += player.onGround ? 0 : 0.1;

  if(player.y >= 285){
    player.y = 285;
    player.vy = 0;
    player.onGround = true;
    player.rot = 0;
  }

  if(frame % Math.max(55, 105-Math.floor(speed*6)) === 0) addObstacle();
  if(frame % 90 === 0) addCoin();

  obstacles.forEach(o=>o.x -= speed);
  coins.forEach(c=>{c.x -= speed; c.t += .12;});

  obstacles = obstacles.filter(o=>o.x>-70);
  coins = coins.filter(c=>c.x>-40 && !c.got);

  for(const o of obstacles){
    if(rectHit(player,o)){
      gameOver = true;
      best = Math.max(best, Math.floor(score));
      localStorage.setItem("elias_best_v2", best);
    }
  }

  for(const c of coins){
    const dx = (player.x+player.w/2)-c.x;
    const dy = (player.y+player.h/2)-c.y;
    if(Math.sqrt(dx*dx+dy*dy) < 42){
      c.got = true;
      coinsCount++;
      score += 2;
      for(let i=0;i<10;i++) particles.push({x:c.x,y:c.y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:22});
    }
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
  ctx.fill();
}

function drawCloud(x,y,s){
  ctx.fillStyle = "rgba(255,255,255,.85)";
  ctx.beginPath();
  ctx.arc(x,y,24*s,0,Math.PI*2);
  ctx.arc(x+28*s,y-10*s,32*s,0,Math.PI*2);
  ctx.arc(x+62*s,y,25*s,0,Math.PI*2);
  ctx.fill();
}

function draw(){
  const g = ctx.createLinearGradient(0,0,0,420);
  g.addColorStop(0,"#7dd3fc");
  g.addColorStop(.58,"#38bdf8");
  g.addColorStop(.59,"#22c55e");
  g.addColorStop(1,"#14532d");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,900,420);

  clouds.forEach(c=>drawCloud(c.x,c.y,c.s));

  ctx.fillStyle = "rgba(0,0,0,.15)";
  for(let x=(-frame*speed)%70; x<900; x+=70) ctx.fillRect(x,360,38,8);

  coins.forEach(c=>{
    ctx.save();
    ctx.translate(c.x,c.y);
    ctx.scale(1+Math.sin(c.t)*.15,1);
    ctx.fillStyle="#facc15";
    ctx.beginPath();
    ctx.arc(0,0,c.r,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#fde68a";
    ctx.font="bold 16px Arial";
    ctx.textAlign="center";
    ctx.fillText("$",0,6);
    ctx.restore();
  });

  obstacles.forEach(o=>{
    ctx.fillStyle="#ef4444";
    roundRect(o.x,o.y,o.w,o.h,9);
    ctx.fillStyle="rgba(255,255,255,.25)";
    roundRect(o.x+6,o.y+6,o.w-12,8,4);
  });

  ctx.save();
  ctx.translate(player.x+player.w/2, player.y+player.h/2);
  ctx.rotate(player.rot);
  ctx.fillStyle="#a3e635";
  roundRect(-player.w/2,-player.h/2,player.w,player.h,14);
  ctx.fillStyle="#111827";
  ctx.beginPath(); ctx.arc(10,-12,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#22c55e";
  roundRect(-18,18,36,10,6);
  ctx.restore();

  particles.forEach(p=>{
    ctx.fillStyle=`rgba(255,255,255,${p.life/25})`;
    ctx.fillRect(p.x,p.y,4,4);
  });

  ctx.fillStyle="rgba(0,0,0,.35)";
  roundRect(18,18,250,78,18);
  ctx.fillStyle="white";
  ctx.font="bold 24px Arial";
  ctx.fillText("Score: "+Math.floor(score),38,50);
  ctx.fillText("🪙 "+coinsCount+"   🏆 "+best,38,84);

  if(!started){
    ctx.fillStyle="rgba(0,0,0,.45)";
    ctx.fillRect(0,0,900,420);
    ctx.fillStyle="white";
    ctx.textAlign="center";
    ctx.font="bold 46px Arial";
    ctx.fillText("Bereit, Elias?",450,165);
    ctx.font="24px Arial";
    ctx.fillText("Tippen oder Leertaste drücken",450,215);
    ctx.textAlign="left";
  }

  if(gameOver){
    ctx.fillStyle="rgba(0,0,0,.55)";
    ctx.fillRect(0,0,900,420);
    ctx.fillStyle="#facc15";
    ctx.textAlign="center";
    ctx.font="bold 54px Arial";
    ctx.fillText("Game Over",450,160);
    ctx.fillStyle="white";
    ctx.font="25px Arial";
    ctx.fillText("Score: "+Math.floor(score)+"   Münzen: "+coinsCount,450,210);
    ctx.fillText("Klicke / tippe zum Neustart",450,255);
    ctx.textAlign="left";
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
